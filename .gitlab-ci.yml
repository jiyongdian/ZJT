# =============================================================================
# GitLab CI/CD 配置文件
# 自动运行单元测试
# =============================================================================
#
# 使用方式：
# 1. 将此文件推送到 GitLab 仓库
# 2. 确保 GitLab Runner 配置了 Docker executor 或 DinD (Docker-in-Docker)
# 3. 流水线将自动在 push 和 MR 时触发
#
# 查看流水线：GitLab → CI/CD → Pipelines
# =============================================================================

stages:
  - test

# 变量配置
variables:
  # Docker 配置 - DinD
  DOCKER_HOST: tcp://docker:2375
  DOCKER_OPTS: "--registry-mirror=https://docker.mirrors.ustc.edu.cn"
  DOCKER_TLS_CERTDIR: ""
  FF_NETWORK_PER_BUILD: "1"

  # 测试数据库配置
  DB_HOST: mysql_test
  DB_PORT: "3306"
  DB_USER: root
  DB_PASSWORD: root_test_pass
  DB_NAME: zjt_unittest

  # 环境配置
  comfyui_env: unit
  PYTHONUNBUFFERED: "1"
  PYTHONDONTWRITEBYTECODE: "1"
  PYTHONUTF8: "1"

# =============================================================================
# 单元测试 job
# =============================================================================
unit_tests:
  stage: test

  # 使用 Docker-in-Docker (DinD) 来运行 docker-compose
  image: m.daocloud.io/docker.io/library/docker:24-cli

  services:
    - name: m.daocloud.io/docker.io/library/docker:24-dind
      alias: docker
      # 关键：在 service 级别设置环境变量，确保 dind 使用非 TLS 模式
      variables:
        DOCKER_TLS_CERTDIR: ""
      # 暂时注释 registry-mirror，排除镜像源导致启动阻塞的问题
      # 确认 dind 正常工作后可以取消注释
      # command: 
      #   - "--registry-mirror=https://docker.1ms.run"
      #   - "--registry-mirror=https://m60nr9km.mirror.aliyuncs.com"
      #   - "--registry-mirror=https://docker.mirrors.ustc.edu.cn"


  # 缓存配置（加速后续构建）
  cache:
    key: ${CI_COMMIT_REF_SLUG}
    paths:
      - cache/pip
      - .cache/pip

  before_script:
    # 使用国内 Alpine 镜像源加速
    - sed -i 's/dl-cdn.alpinelinux.org/mirrors.aliyun.com/g' /etc/apk/repositories

    # 安装必要工具（包括 Docker CLI）
    - apk add --no-cache python3 py3-pip mysql-client

    # 等待 Docker daemon 就绪
    - |
      echo "Waiting for Docker daemon..."
      max_attempts=60
      for i in $(seq 1 $max_attempts); do
        if docker info > /dev/null 2>&1; then
          echo "Docker daemon is ready!"
          break
        fi
        if [ $i -eq $max_attempts ]; then
          echo "ERROR: Docker daemon failed to start after $max_attempts attempts"
          echo "Checking dind service status..."
          cat /var/log/docker.log 2>/dev/null || true
          exit 1
        fi
        echo "Attempt $i/$max_attempts - waiting..."
        sleep 2
      done

    # 调试：检查 DinD 服务
    - echo "DOCKER_HOST=$DOCKER_HOST"
    - cat /etc/docker/daemon.json 2>/dev/null || echo "No daemon.json"
    - ps aux | grep dockerd || echo "dockerd not running"
    - cat /etc/resolv.conf | grep docker || echo "No docker in resolv.conf"
    - nslookup docker 2>/dev/null || echo "Cannot resolve docker"

    # 验证 Docker 是否可用
    - docker --version
    - docker-compose --version

    # 复制测试配置
    - cp config.example.yml config_unit.yml || true

  script:
    # 进入 docker 目录
    - cd docker

    # 启动测试环境（MySQL + 测试容器）
    - docker compose -f docker-compose-test.yml up -d --build

    # 等待 MySQL 就绪
    - |
      for i in {1..30}; do
        docker exec zjt_mysql_test mysqladmin ping -h localhost -u root -proot_test_pass && break
        echo "等待 MySQL 启动..."
        sleep 2
      done

    # 等待测试容器完成并获取日志
    - |
      echo "等待测试执行完成..."
      timeout=600
      elapsed=0
      while [ $elapsed -lt $timeout ]; do
        status=$(docker inspect -f '{{.State.Status}}' zjt_test 2>/dev/null || echo "not_found")
        if [ "$status" == "exited" ]; then
          break
        fi
        echo "测试进行中... (${elapsed}s)"
        sleep 10
        elapsed=$((elapsed + 10))
      done

    # 获取容器退出码
    - exit_code=$(docker inspect -f '{{.State.ExitCode}}' zjt_test 2>/dev/null || echo "1")

    # 显示测试日志
    - docker logs zjt_test || true

    # 获取测试结果
    - |
      if docker cp zjt_test:/app/test-results.xml ../test-results.xml 2>/dev/null; then
        echo "测试结果已保存"
      else
        echo "注意：无法获取 test-results.xml，查看上方日志了解测试情况"
      fi

    # 停止测试环境
    - docker-compose -f docker-compose-test.yml down -v || true

    # 根据退出码决定 CI 结果
    - |
      echo "测试容器退出码: $exit_code"
      if [ "$exit_code" != "0" ]; then
        echo "测试失败！退出码: $exit_code"
        exit 1
      fi

  # 测试 artifacts
  artifacts:
    when: always
    paths:
      - test-results.xml
      - docker/*.log
      - docker/logs/
    reports:
      junit: test-results.xml
    expire_in: 7 days

  # 标签（根据实际 Runner 配置调整）
  tags:
    - docker

  # 规则：推送和 MR 时触发
  rules:
    - if: $CI_COMMIT_BRANCH
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"

