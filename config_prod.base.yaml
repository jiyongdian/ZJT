pay:
  wxpay:
    appId: ""
    mchId: ""
    api_key: ""
    APIv3_key: ""
    appSecret: ""


llm:
  baidu:
    api_key: ""
    api_url: "https://qianfan.baidubce.com/v2/chat/completions"
    model: "ernie-4.5-turbo-vl-latest"
  qwen:
    api_key: ""
    base_url: "https://dashscope.aliyuncs.com/compatible-mode/v1"
  google:
    api_key: ""
    gemini_base_url: "https://api.jiekou.ai"
  claude:
    api_key: ""
    base_url: "https://api.jiekou.ai/openai"
  ollama:
    enabled: false  # 是否启用 Ollama 本地模型
    base_url: "http://192.168.10.191:11434"  # Ollama 服务地址
    # 模型参数配置
    temperature: 0.7  # 温度参数 (0.0-2.0)
    top_p: 0.8  # 核采样概率 (0.0-1.0)
    top_k: 20  # Top-K 采样
    min_p: 0.0  # 最小概率阈值
    presence_penalty: 1.5  # 存在惩罚
    repetition_penalty: 1.0  # 重复惩罚
    enable_thinking: false  # 是否启用思维链（部分模型支持）
  deepseek:
    api_key: ""  # DeepSeek API Key
    base_url: "https://api.deepseek.com"

tts:
  api_url: "http://47.98.190.124"
  upload_url: "http://47.98.190.124/result_audio/"

test_mode:
  enabled: false
  mock_videos:
    image_to_video: ""
    text_to_video: ""
  mock_images:
    image_edit: ""
    text_to_image: ""

task_queue:
  max_retry_count: 30
  task_expire_days: 7
  enable_expire_check: true

upload:
  max_image_size_mb: 10
  max_video_size_mb: 50
  max_video_duration_seconds: 15

frontend:
  debug_password: "123"
  # 前端静态资源缓存失效开关
  # enabled: true 时，HTML 中的 js/css 引用会自动添加 ?v={version_hash} 参数
  # 用于上线后强制浏览器重新加载新版本的前端资源
  cache_bust:
    enabled: true


image:
  enable_download: true

media_cache:
  enabled: true
  cache_dir: "upload/cache"
  max_days: 30
  max_size_gb: 10
  cleanup_on_startup: true
  cleanup_interval_hours: 24

file_storage:
  qiniu:
    access_key: ""
    secret_key: ""
    bucket_name: ""
    cdn_domain: ""
  qiniu_long_term:
    access_key: ""
    secret_key: ""
    bucket_name: ""
    cdn_domain: ""

zjt:
  token: ""

# 每日签到配置
checkin:
  enabled: false                     # 是否启用每日签到功能
  base_reward: 6                   # 每日签到基础奖励算力
  streak_bonus_enabled: true        # 是否启用连续签到额外奖励
  streak_bonus_config:              # 连续签到奖励配置，键为连续天数，值为额外奖励算力
    3: 12
    7: 18
    14: 24
    30: 30

enterprise:
  min_version: "1.1.0"


# 自动升级配置
# 支持通过 git 在启动时检查并更新代码
upgrade:
  enabled: true              # 是否启用启动时检查更新
  repo_urls:                 # Git 仓库地址（多源，按顺序尝试）
    - "https://gitee.com/jeffstric/ZJT.git"       # 优先 Gitee（国内快）
    - "https://github.com/jeffstric/ZJT.git"      # 备用 GitHub
  branch: "main"             # 跟踪分支
  timeout_seconds: 30        # git fetch/pull 超时（秒）
