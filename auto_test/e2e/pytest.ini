[pytest]
testpaths = .
python_files = test_*.py
python_functions = test_*
python_classes = Test*

markers =
    e2e: end-to-end tests
    p0: P0 core features (must pass)
    p1: P1 important features (should pass)
    p2: P2 minor features (optional)
    auth: authentication module
    session: session management module
    world: world management module
    character: character management module
    location: location management module
    workflow: workflow CRUD module
    workflow_page: workflow frontend page module
    workflow_list: workflow list page module
    workflow_editor: workflow editor module
    node_operations: node operations module
    timeline: video timeline module
    camera_control: camera control module
    shot_frame_video: shot frame video generation module
    grid_image: grid image generation module
    shot_group_video: shot group video generation module
    error_handling: error handling module
    audio: audio module
    script_writer: script writer module
    marketing_agent: marketing agent module
    admin: admin module
    character_card: character card module
    computing_power: computing power log module
    recharge: external recharge module

addopts =
    -v
    --tb=short
    --strict-markers
    --timeout=60
    -p no:asyncio
    -p no:anyio
    -p no:hydra

log_cli = true
log_cli_level = INFO
log_cli_format = %(asctime)s [%(levelname)8s] %(message)s
log_cli_date_format = %Y-%m-%d %H:%M:%S
