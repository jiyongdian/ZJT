[pytest]
testpaths = .
python_files = test_*.py
python_functions = test_*
python_classes = Test*

markers =
    e2e: 端到端测试
    p0: P0 核心功能（必须通过）
    p1: P1 重要功能（应该通过）
    p2: P2 次要功能（可选通过）
    auth: 认证模块
    session: 会话管理模块
    world: 世界管理模块
    character: 角色管理模块
    location: 场景管理模块
    workflow: 工作流 CRUD 模块
    workflow_page: 工作流前端页面模块
    workflow_list: 工作流列表页模块
    workflow_editor: 工作流编辑器模块
    node_operations: 节点操作模块
    timeline: 视频时间轴模块
    camera_control: 相机控制模块
    shot_frame_video: 分镜视频生成模块
    grid_image: 宫格图片生成模块
    shot_group_video: 分镜组视频生成模块
    error_handling: 错误处理模块
    audio: 音频模块
    script_writer: 剧本编辑器模块
    marketing_agent: 营销智能体模块
    admin: 管理后台模块
    character_card: 角色卡模块
    computing_power: 算力日志模块
    recharge: 外部充值模块

addopts =
    -v
    --tb=short
    --strict-markers
    --timeout=60
    -p no:asyncio
    -p no:anyio
    -p no:hydra

log_cli = true
log_cli_level = INFO
log_cli_format = %(asctime)s [%(levelname)8s] %(message)s
log_cli_date_format = %Y-%m-%d %H:%M:%S
