# 二进制依赖配置
# 记录系统运行所需的二进制工具及其版本要求
#
# 字段说明：
#   name: 工具名称
#   description: 工具描述
#   download_url: 下载地址（可选）
#   check_paths: 按平台的检查路径
#   required_since: 从哪个版本开始需要此依赖（语义化版本号）

