# Task queue management
task_queue:
  max_retry_count: 30  # 最大重试次数，超过后任务将被标记为失败
  task_expire_days: 7  # 任务过期天数，创建后超过此天数的任务将被自动失败
  enable_expire_check: true  # 是否启用任务过期检查


# Upload file size limits (in MB)
upload:
  max_image_size_mb: 10  # 角色、场景、道具的参考图片最大大小限制（MB）
  max_video_size_mb: 50  # Agent 对话模式上传视频最大大小限制（MB）
  max_video_duration_seconds: 15  # Agent 对话模式上传视频最大时长（秒）

# Frontend debug mode
frontend:
  debug_password: "123"
  # 前端静态资源缓存失效开关
  # enabled: true 时，HTML 中的 js/css 引用会自动添加 ?v={version_hash} 参数
  # 用于上线后强制浏览器重新加载新版本的前端资源
  cache_bust:
    enabled: true  # 前端 Debug 模式密码
  # Vue 错误输出开关（开发调试用）
  # enabled: true 时，Vue 运行时错误会输出到浏览器控制台
  enable_vue_error_output: false

# Workflow configuration
workflow:
  poll_status_interval: 30  # 工作流节点状态轮询间隔（秒），默认60秒

# Alembic 数据库迁移配置
alembic:
  auto_migrate: true  # 应用启动时是否自动执行迁移
  script_location: "alembic"  # 迁移脚本目录

# Edition configuration
edition:
  mode: "community"
  shared_space: false  # 商业版是否使用共享空间模式（true=所有用户共享数据，false=按用户隔离，默认false）

file_storage:
  # Qiniu cloud storage configuration
  # 标准存储每月免费额度具体包括：
  # 存储空间：10GB/月
  # CDN回源流量：10GB/月
  # 请求次数：
  # PUT/DELETE 请求：10万次/月
  # GET 请求：100万次/月
  # 具体参考 https://developer.qiniu.com/kodo/6379/metering-and-billing?ref=support.qiniu.com
  # 注册请使用以下链接，获取专属优惠: https://s.qiniu.com/6zymqy
  qiniu:
    access_key: "IAM-0fZBG5O0nEj9Xy-d_vjtowNp4viwWmjaDx8tNjCY"  # 七牛云 Access Key
    secret_key: "HD3mwsOHnr5uSjPRTyvIWDrmwCEfOUlwQiT5HhNft9TB"  # 七牛云 Secret Key
    bucket_name: "jeffstric"  # 存储空间名称
    cdn_domain: "cdn.perseids.cn"  # CDN 加速域名  绑定CDN加速域名图文教程文档，您可以参考：https://developer.qiniu.com/fusion/manual/4939/the-domain-name-to-access 需要注意您要绑定工信部备案的域名。
  # 长期存储配置（用于 AI Tools 结果自动同步到 CDN）
  qiniu_long_term:
    access_key: ""  # 七牛云 Access Key
    secret_key: ""  # 七牛云 Secret Key
    bucket_name: ""  # 存储空间名称
    cdn_domain: ""  # CDN 加速域名

image:
  enable_download: true
  max_retry_count: 2  # 图片生成失败后自动重试次数

# 媒体文件缓存配置
media_cache:
  enabled: true                    # 是否启用缓存
  cache_dir: "upload/cache"        # 缓存目录（相对于项目根目录）
  max_days: 30                     # 文件保留天数（0=不限制）
  max_size_gb: 10                  # 最大缓存容量GB（0=不限制）
  cleanup_on_startup: true         # 启动时执行清理
  cleanup_interval_hours: 24       # 定时清理间隔（小时）

# 同步任务进程池配置（用于Gemini、Seedream等同步API）
sync_task:
  max_workers: 4                   # 进程池最大并发数
  check_interval: 5                # 结果检查间隔（秒）

# Sentry 配置
sentry:
  dsn: "https://xxxxx6"
  environment: "test"  # 可选，默认 "production"

# 每日签到配置
checkin:
  enabled: false                     # 是否启用每日签到功能
  base_reward: 6                   # 每日签到基础奖励算力
  streak_bonus_enabled: true        # 是否启用连续签到额外奖励
  streak_bonus_config:              # 连续签到奖励配置，键为连续天数，值为额外奖励算力
    3: 12
    7: 18
    14: 24
    30: 30

zjt:
  token: ""


# 自动升级配置
# 支持通过 git 在启动时检查并更新代码
upgrade:
  enabled: true              # 是否启用启动时检查更新
  repo_urls:                 # Git 仓库地址（多源，按顺序尝试）
    - "https://gitee.com/jeffstric/ZJT.git"       # 优先 Gitee（国内快）
    - "https://github.com/jeffstric/ZJT.git"      # 备用 GitHub
  branch: "main"             # 跟踪分支
  timeout_seconds: 30        # git fetch/pull 超时（秒）

