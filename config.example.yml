# =============================================================================
# 配置文件说明
# 修改本文件后，请检查是否需要同步修改 config/default_configs.py
# 如果涉及配置 key 的变更（新增/删除/重命名），需要同时:
#   1. 更新 config/default_configs.py 中的 DEFAULT_CONFIGS 列表
#   2. 创建 alembic migration 脚本更新数据库中已有的配置 key
# =============================================================================

runninghub:
  host: "https://www.runninghub.cn"
  api_key: ""
  max_concurrent_slots: 3    # 该值根据runninghub账号的 并发数决定，可以查看 https://www.runninghub.cn/vip-rights/2 查看并发数，注意，必须支持api调用的套餐才能使用 26年3月 基础版为1 专业版为3 专业Plus版为5 Max 为20
# Server configuration
server:
  host: "http://localhost:9003"
  is_local: true  # 是否为本地环境，如果是本地环境，进行图片生成以及视频生成时，将参考图片上传到图床中。
  https_host: "https://localhost:12443"
  port: 9003                # 如需自定义端口可保留
  https_port: 5174
  https:
    enabled: false
    certfile: "secret/xxx.pem"
    keyfile: "secret/xxx.key"
  auto_upload_to_cdn: false  # AI Tools 生成结果是否自动上传到 CDN（需要配置 file_storage.qiniu_long_term）
  # 网站底部信息配置
  footer:
    copyright: "© 2026 智剧通 AI短剧制作平台 | 所有权利保留"  # 版权信息
    icp_number: ""  # ICP备案号，如：京ICP备12345678号
    icp_url: "https://beian.miit.gov.cn/"  # ICP备案查询链接
    police_number: ""  # 公安备案号，如：京公网安备 11010502000000号
    police_url: ""  # 公安备案查询链接
# Default timeout settings
timeout:
  request_timeout: 10000
  sync_request_timeout: 300  # 同步请求超时时间（秒），用于火山引擎等同步接口
  status_check_timeout: 900
  status_check_interval: 10

# SMS configuration (短信服务配置)
sms:
  # 全局驱动选择（可选，如果设置则覆盖各agent的driver配置）
  # 取消注释下面这行可以全局切换驱动
  active_driver: "perseids"  # 可选值: "legacy", "perseids"
  agents:
    # 默认代理：使用阿里云SDK
    default:
      driver: "legacy"
      access_key_id: "LTAI5txxxxxxxx"
      access_key_secret: "eKRGvkHCxxxxxxxx"
      sign_name: "公司名称"
      template_code: "SMS_29225xxxx"
      region_id: "cn-hangzhou"
    # API代理示例：使用HTTP API发送短信
    api_agent:
      driver: "perseids" 
      api_url: "https://ailive.perseids.cn:11443/api/v1/live/send_verify_code_simple"  # 短信API接口地址
      method: "POST"  # 请求方法，默认POST
      verify_ssl: true  # 是否验证SSL证书（使用http协议时设为false）

# Email configuration (邮箱验证码配置)
email:
  enabled: false                        # 是否启用邮箱注册/登录（开关）
  active_driver: "api"  # 可选值: "smtp", "api"
  agents:
    # SMTP 代理：直接通过SMTP发送邮件
    default:
      driver: "smtp"
      smtp_host: "smtp.gmail.com"      # SMTP 服务器地址
      smtp_port: 587                    # SMTP 端口（TLS: 587, SSL: 465）
      smtp_user: "your@email.com"       # SMTP 登录账号
      smtp_password: "app_password"     # SMTP 密码 / 应用专用密码
      smtp_from: "your@email.com"       # 发件人地址
      smtp_from_name: "智剧通"          # 发件人显示名称
      use_tls: true                     # 是否使用 TLS
    # API 代理示例：通过HTTP API发送邮件（无需配置SMTP）
    api_agent:
      driver: "api"
      api_url: "https://ailive.perseids.cn:11443/api/v1/live/send_email_verify_code"  # 邮件API接口地址
      method: "POST"  # 请求方法，默认POST
      verify_ssl: true  # 是否验证SSL证书（使用http协议时设为false）

# Captcha configuration (人机验证配置 - 用于邮箱验证码发送)
captcha:
  enabled: false                          # 是否启用 CAPTCHA 验证
  aliyun:
    access_key_id: ""                     # 阿里云 AccessKey ID（建议 RAM 子账号）
    access_key_secret: ""                 # 阿里云 AccessKey Secret
    region_id: "cn-shanghai"              # CAPTCHA 服务区域（cn-shanghai 或 sg-1）
    prefix: ""                            # 验证码2.0 身份标（控制台概览页获取）
    scene_id: ""                          # 验证码2.0 场景ID

